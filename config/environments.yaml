# environments.yaml — Immutable Date Split Configuration
# ⚠️ THIS FILE IS IMMUTABLE DURING A RESEARCH PHASE ⚠️
# DO NOT MODIFY without explicit human approval and version bump.
# AI agents may READ this file but NEVER propose modifications.
# Changing date splits mid-research invalidates all prior experiment results.
# Last reviewed: 2026-04-17 (Phase 2A D4 — bumped v1 → v2 for regime holdout)

version: "v2"

# ============================================================
# DATE SPLITS (v2 — Phase 2)
# ============================================================
# All dates are inclusive, UTC, date-only (no time component).
# v2 introduces a disjoint train_windows list (skipping 2022) plus a
# fixed regime_holdout block. The 2022 bear market is held out from
# every training window so it can serve as a regime stress test the
# AI never sees during hypothesis generation.
#
# Strategies may ONLY optimize parameters using train_windows data.
# regime_holdout is consumed orchestrator-internal only (no CLI).
# Validation is for model selection / early stopping only.
# Test is touched ONCE for final evaluation per strategy.

splits:
  # --- Disjoint train ranges (2022 deliberately excluded) ---
  # Each entry is [start_inclusive, end_inclusive], date-only UTC.
  # Walk-forward sub-windows are generated from each range
  # independently. 2022 bars are NEVER part of any training window.
  train_windows:
    - ["2020-01-01", "2021-12-31"]
    - ["2023-01-01", "2023-12-31"]

  # --- Regime holdout (2022 bear market) ---
  # Orchestrator-internal only. The Proposer/Critic NEVER see results
  # from this block in any prompt context (CLAUDE.md hard constraint).
  # passing_criteria is an AND gate: ALL four must be satisfied for
  # regime_holdout_passed = True.
  regime_holdout:
    start: "2022-01-01"
    end: "2022-12-31"
    label: "bear_2022"
    passing_criteria:
      min_sharpe: -0.5            # allow loss but not crash
      max_drawdown: 0.25          # single DD ≤ 25%
      min_total_return: -0.15     # full year loss ≤ 15%
      min_total_trades: 5         # must actually trade

  # --- Validation (placeholder for D7+; no execution path in D4) ---
  validation:
    start: "2024-01-01"
    end: "2024-12-31"
    purpose: "Hyperparameter selection, leaderboard ranking (Phase 2B+)"
    notes: "BTC ETF approval era, halving year"

  # --- Test (placeholder for final OOS; no execution path in D4) ---
  test:
    start: "2025-01-01"
    end: "2025-12-31"
    purpose: "Final out-of-sample evaluation ONLY. Touch once per strategy."
    notes: "Post-halving period"

  # --- Live forward (placeholder for paper/live trading in Phase 4+) ---
  live_forward:
    start: "2026-01-01"
    end: null  # ongoing
    purpose: "Paper trading and eventual live trading"
    notes: "True out-of-sample. Never used for any form of optimization."

# ============================================================
# EVALUATION REGIMES (v2 — PHASE2C_8.1 §3.4 multi-regime extension)
# ============================================================
# Additive namespace for PHASE2C_8.1's novel evaluation regimes
# (eval_2020_v1 + eval_2021_v1). These blocks are evaluation-only —
# they do NOT modify any block in `splits:` and do NOT alter the
# IMMUTABLE date-split contract for train / regime_holdout / validation
# / test. Each block holds a calendar window that the PHASE2C_8.1
# producer evaluates the existing 198-candidate population against.
#
# passing_criteria is intentionally absent from each block — the
# 4-criterion AND gate is inherited from `splits.regime_holdout` per
# PHASE2C_7.1 §3 / Q1 cross-block coupling (see
# backtest/engine.py:_resolve_passing_criteria_with_inheritance).
# Inheritance preserves PHASE2C_8.1 D2 carry-forward (uniform thresholds
# across all 4 regimes; preserves cross-regime comparability).
#
# regime_key shape: `evaluation_regimes.<block_name>` (matches the
# top-level namespace). REGIME_KEY_LABEL_MAPPING in
# backtest/wf_lineage.py is the SSOT mapping each regime_key to its
# regime_label; novel regimes carry phase2c_8_1 schema discriminator
# per REGIME_KEY_TO_SCHEMA_VERSION_MAPPING.

evaluation_regimes:
  # 2020 calendar-year window — pandemic-driven bimodal volatility
  # regime per PHASE2C_8.1 §3.3.2 (Q1 2020 COVID-19 crash + Q4 2020
  # post-crash recovery rally). Train-overlap caveat: 2020 is part of
  # v2.splits.train_windows; evaluation is in-sample wrt PHASE2C_5
  # candidate-screening per §7.4 / §10.6 Concern A.
  eval_2020_v1:
    start: "2020-01-01"
    end: "2020-12-31"
    label: "eval_2020_v1"
    macro_characterization: "pandemic_bimodal"
    arc_of_origin: "PHASE2C_8.1"

  # 2021 calendar-year window — cycle-peak parabolic-bull regime per
  # PHASE2C_8.1 §3.3.2 (Q4 2021 ATH; mid-year May 2021 selloff;
  # high-volatility bull regime with sustained directional bias).
  # Train-overlap caveat: 2021 is part of v2.splits.train_windows;
  # in-sample wrt PHASE2C_5 candidate-screening per §7.4 / §10.6.
  eval_2021_v1:
    start: "2021-01-01"
    end: "2021-12-31"
    label: "eval_2021_v1"
    macro_characterization: "parabolic_bull"
    arc_of_origin: "PHASE2C_8.1"

# ============================================================
# WALK-FORWARD CONFIGURATION (Phase 1+)
# ============================================================
# Rolling sub-window parameters applied independently within each
# train_windows range. A range shorter than (train + test) months
# produces zero sub-windows for that range.

walk_forward:
  train_window_months: 12
  test_window_months: 3
  step_months: 3
  # Example v2 sequence over the 2020-2021 range:
  #   Train: 2020-01 to 2020-12 → Test: 2021-01 to 2021-03
  #   Train: 2020-04 to 2021-03 → Test: 2021-04 to 2021-06
  #   Train: 2020-07 to 2021-06 → Test: 2021-07 to 2021-09
  #   Train: 2020-10 to 2021-09 → Test: 2021-10 to 2021-12
  # The 2023 range alone is too short for these defaults; orchestrators
  # that need sub-windows from 2023 should pass smaller wf params via
  # the engine API.

# ============================================================
# RULES
# ============================================================

rules:
  - "Agent-generated strategies may ONLY access data within train_windows during development"
  - "Regime holdout (2022) is orchestrator-internal — never expose a CLI flag and never include holdout results in any LLM prompt"
  - "Validation split results may inform which strategies advance, but NOT how they are parameterized"
  - "Test split is a ONE-SHOT evaluation. If results are used to modify the strategy, the test becomes validation and a new test period must be designated"
  - "Walk-forward windows must be version-tracked in experiment_registry alongside split version"
  - "If this file is updated, version must be bumped and all experiments must record which version they used"
